services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: hospital-fhir
    ports:
      - "8080:8080"
    environment:
      - hapi.fhir.default_encoding=json
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_multiple_delete=true
      - hapi.fhir.reuse_cached_search_results_millis=-1
    volumes:
      - hapi-data:/data/hapi

  mock-data-loader:
    image: curlimages/curl:latest
    container_name: fhir-data-loader
    depends_on:
      - hapi-fhir
    volumes:
      - ./data:/data:ro
      - ./scripts/docker-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
      - MAX_RETRIES=60
      - RETRY_INTERVAL=3
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: "no"

volumes:
  hapi-data:
